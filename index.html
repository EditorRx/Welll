<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generatd by Rk</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
    font-family: Arial;
    padding: 20px;
}

/* Input */
textarea {
    width: 100%;
    height: 150px;
    padding: 10px;
}

/* A4 Layout */
#output {
    width: 210mm;
    min-height: 297mm;
    padding: 15mm;
    border: 1px solid #000;

    column-count: 2;
    column-gap: 20px;

    font-size: 12px;
    line-height: 1.2;

    white-space: pre-wrap;
}

/* Remove unwanted spacing */
#output * {
    margin: 0;
    padding: 0;
}

/* Question spacing */
.question {
    margin-bottom: 6px;
}

/* Option spacing */
.option {
    margin-left: 10px;
}

/* Pair layout */
.option-row {
    display: flex;
    justify-content: space-between;
    margin-left: 10px;
}

.option-row span {
    width: 48%;
}
</style>
</head>

<body>

<h2>🔥 Exam Generator Ultimate</h2>

<textarea id="inputText" placeholder="Paste questions here..."></textarea><br>

<label>
<input type="checkbox" id="pairToggle"> Pair Options (A-B / C-D)
</label>

<br><br>

<button onclick="formatText()">Format</button>
<button onclick="downloadPDF()">Download PDF</button>

<div id="output" contenteditable="true"></div>

<script>
function formatText() {
    let text = document.getElementById("inputText").value;
    let pairMode = document.getElementById("pairToggle").checked;

    let lines = text.split("\n");
    let result = [];

    for (let i = 0; i < lines.length; i++) {

        let line = lines[i];

        // Detect question line
        if (line.match(/^\d+\./)) {
            line = line.replace(/(\d+\.[^\n?—]*(\?|—))/, "<b>$1</b>");
            result.push(`<div class="question">${line}</div>`);
        }

        // Detect options
        else if (line.match(/^\([A-Da-d]\)/)) {

            if (pairMode && i + 1 < lines.length && lines[i+1].match(/^\([A-Da-d]\)/)) {

                let row = `<div class="option-row">
                                <span>${line}</span>
                                <span>${lines[i+1]}</span>
                           </div>`;
                result.push(row);
                i++; // skip next

            } else {
                result.push(`<div class="option">${line}</div>`);
            }
        }

        // Normal text
        else {
            result.push(`<div>${line}</div>`);
        }
    }

    document.getElementById("output").innerHTML = result.join("");
}

async function downloadPDF() {
    const { jsPDF } = window.jspdf;

    let element = document.getElementById("output");

    let canvas = await html2canvas(element, { scale: 2 });

    let imgData = canvas.toDataURL("image/png");

    let pdf = new jsPDF('p', 'mm', 'a4');

    pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);

    pdf.save("Exam_Paper.pdf");
}
</script>

</body>
</html>
